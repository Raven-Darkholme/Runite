<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download - RUNITE</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            color: white;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #2a0f3f, #1a1026);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Фоновые иконки */
        .bg-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-icon {
            position: absolute;
            fill: white;
            opacity: 0.05;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        /* Контент поверх фона */
        h1, .download-grid, .back-link {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            color: #ffd966;
            text-shadow: 0 0 20px rgba(255, 217, 102, 0.4);
            margin-bottom: 50px;
            transform: skew(-5deg);
            text-align: center;
        }

        .download-grid {
            display: flex;
            gap: 40px;
            perspective: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hex-wrapper {
            text-decoration: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }

        .hexagon {
            width: 200px;
            height: 220px;
            background: rgba(255, 255, 255, 0.05);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .google { background: linear-gradient(135deg, #34a85311, #4285f422); border-bottom: 4px solid #34a853; }
        .apple { background: linear-gradient(135deg, #55555522, #00000033); border-bottom: 4px solid #ffffff; }
        .nintendo { background: linear-gradient(135deg, #e6001211, #e6001222); border-bottom: 4px solid #e60012; }

        .hexagon svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            transition: transform 0.4s ease;
        }

        .hex-wrapper:hover {
            transform: translateY(-15px) scale(1.1) rotateY(10deg);
        }

        .hex-wrapper:hover .hexagon {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .platform-name {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .back-link {
            margin-top: 60px;
            color: #ff7a18;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #ff7a18;
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-link:hover { background: #ff7a18; color: white; }

        @media (max-width: 768px) {
            body { overflow-y: auto; justify-content: flex-start; padding-top: 40px; }
            h1 { font-size: 1.8rem; }
            .download-grid { flex-direction: column; gap: 30px; }
            .hexagon { width: 160px; height: 180px; }
            .hexagon svg { width: 60px; height: 60px; }
            .hex-wrapper:hover { transform: translateY(-5px) scale(1.05); }
        }
    </style>
</head>
<body>

    <!-- Фоновые иконки -->
    <div class="bg-icons">
        <svg class="bg-icon" style="left: 10%; width: 100px; animation-duration: 25s;" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <svg class="bg-icon" style="left: 30%; width: 60px; animation-duration: 18s; animation-delay: -5s;" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <svg class="bg-icon" style="left: 60%; width: 120px; animation-duration: 30s; animation-delay: -2s;" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <svg class="bg-icon" style="left: 85%; width: 80px; animation-duration: 22s; animation-delay: -10s;" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    </div>

    </div>

    <a href="index.html" class="back-link">ГЛАВНАЯ СТРАНИЦА</a>

</body>
</html>
